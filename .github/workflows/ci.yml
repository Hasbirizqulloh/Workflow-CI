name: CI - Train Model with MLflow

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CSV_PATH: MLProject/obesity_preprocessing
  Target: ObesityCategory

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: |
          echo "CSV_PATH: $CSV_PATH"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow dagshub

      - name: Set MLflow Tracking URI
        run: |
          dagshub login --token ${{secrets.dagshub}}

      - name: Run mlflow project
        run: |
          mlflow run MLProject --env-manager=local

      - name: Get latest MLflow run_id
        run: |
          RUN_ID=$(ls -td mlruns/0/*/ | head -n 1 | cut -d'/' -f3)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run_id: $RUN_ID"

      - name: Upload Model Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: obesity-prediction-model
          path: mlruns/0/${{ env.RUN_ID }}/artifacts/model/

      # Build Docker Model
      - name: Build Docker Model
        run: |
          mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "obesity-prediction-model"

      # Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Tag Docker image
      - name: Tag Docker Image
        run: |
          docker tag obesity-prediction-model ${{ secrets.DOCKER_HUB_USERNAME }}/obesity-prediction-model:latest

      # Push Docker image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/obesity-prediction-model:latest
