name: CI - Train Model with MLflow

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CSV_PATH: MLProject/obesity_preprocessing
  Target: ObesityCategory

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: |
          echo "CSV_PATH: $CSV_PATH"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow dagshub scikit-learn pandas joblib

      - name: Run mlflow project
        run: |
          mlflow run MLProject --env-manager=local

      - name: Find and prepare model artifacts
        run: |
          echo "=== Searching for model artifacts ==="
          find . -name "MLmodel" -type f 2>/dev/null
          echo "=== All artifact directories ==="
          find . -path "*/artifacts/model" -type d 2>/dev/null
          find . -path "*/model/MLmodel" -type f 2>/dev/null

          # Copy model to a known location for upload & docker
          MODEL_DIR=$(dirname $(find . -path "*/model/MLmodel" -type f | head -n 1))
          echo "Found model at: $MODEL_DIR"
          mkdir -p ./model_export
          cp -r "$MODEL_DIR"/* ./model_export/
          echo "=== Model export contents ==="
          ls -la ./model_export/

          # Also get the RUN_ID for docker build
          RUN_ID=$(python -c "import mlflow; print(mlflow.search_runs(experiment_ids=['0'], order_by=['start_time DESC'])['run_id'].iloc[0])")
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run_id: $RUN_ID"

      - name: Upload Model Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: obesity-prediction-model
          path: ./model_export/

      # Build Docker Model
      - name: Build Docker Model
        run: |
          echo "Building Docker with RUN_ID: $RUN_ID"
          mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "obesity-prediction-model"

      # Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Tag Docker image
      - name: Tag Docker Image
        run: |
          docker tag obesity-prediction-model ${{ secrets.DOCKER_HUB_USERNAME }}/obesity-prediction-model:latest

      # Push Docker image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/obesity-prediction-model:latest
